<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <h4>Status code: {statusCode} ==> {errorMessage}.</h4>
        <p>You will be redirected to the home page in <span id="countdown">10</span> seconds.</p>
        <p>If redirection does not occur, click <a href="/index.html"><b>here</b></a>.</p>

        <script>
            const countdownDisplay = document.getElementById('countdown');
            let seconds = +countdownDisplay.textContent;

            const intervalId = setInterval(function() {
                seconds--;
                countdownDisplay.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(intervalId);
                    window.location.href = '/index.html';
                }
            }, 1000);
        </script>
    </body>
</html>
